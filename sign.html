<!DOCTYPE html>
<html>
<head>
  <title>Sign Agreement</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
    }

    #pdfContainer {
      border: 1px solid #ccc;
      margin-bottom: 20px;
      padding: 10px;
    }

    canvas {
      border: 1px solid #333;
      width: 100%;
      height: 200px;
    }

    button {
      padding: 10px 14px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Rental Agreement</h2>

<div id="pdfContainer">Loading agreement...</div>

<label>Full Name</label>
<input id="signerName" style="width:100%; padding:10px;" />

<h3>Signature</h3>
<canvas id="canvas" width="800" height="200"></canvas>

<br>
<button onclick="clearCanvas()">Clear</button>
<button onclick="submitSignature()">Submit Signature</button>

<script>
alert("SIGN PAGE JS IS RUNNING");
const SUPABASE_URL = "https://ynpiihwwzhcnfszpaaya.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlucGlpaHd3emhjbmZzenBhYXlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1ODUxMDgsImV4cCI6MjA5MzE2MTEwOH0.rrUY2kMV6j3ftLjsVKlsUDJMVsyqMwzzo7_PiVBr5UY";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const token = new URLSearchParams(window.location.search).get("token");
let requestId = null;

async function loadAgreement() {

  if (!token) {
    document.getElementById("pdfContainer").innerHTML =
      "<h3>Missing signing token</h3>";
    return;
  }

  const { data, error } = await supabase
    .from("signing_requests")
    .select("*")
    .eq("token", token)
    .maybeSingle();

  if (error) {
    document.getElementById("pdfContainer").innerHTML =
      "<h3>Supabase Error</h3><pre>" + JSON.stringify(error) + "</pre>";
    return;
  }

  if (!data) {
    document.getElementById("pdfContainer").innerHTML =
      "<h3>Invalid link</h3>";
    return;
  }

  if (!data.agreement_pdf_base64) {
    document.getElementById("pdfContainer").innerHTML =
      "<h3>No PDF found in database</h3>";
    return;
  }

  if (data.status === "signed") {
    document.body.innerHTML =
      "<h2>This agreement is already signed.</h2>";
    return;
  }

  requestId = data.id;

  document.getElementById("signerName").value =
    data.tenant_name || "";

  document.getElementById("pdfContainer").innerHTML = `
    <embed 
      src="data:application/pdf;base64,${data.agreement_pdf_base64}" 
      width="100%" 
      height="600px"
      type="application/pdf"
    />
  `;
}

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing = false;

canvas.addEventListener("mousedown", () => drawing = true);
canvas.addEventListener("mouseup", () => {
  drawing = false;
  ctx.beginPath();
});

canvas.addEventListener("mousemove", draw);

function draw(e) {
  if (!drawing) return;

  ctx.lineWidth = 2;
  ctx.lineCap = "round";

  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
}

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

async function submitSignature() {
  const name = document.getElementById("signerName").value.trim();

  if (!name) {
    alert("Enter your name.");
    return;
  }

  if (!requestId) {
    alert("Agreement not loaded.");
    return;
  }

  const blob = await new Promise(resolve => canvas.toBlob(resolve));

  const filePath = `${requestId}.png`;

  const upload = await supabase.storage
    .from("signatures")
    .upload(filePath, blob, { upsert: true });

  if (upload.error) {
    alert("Upload failed: " + upload.error.message);
    return;
  }

  const { data: urlData } = supabase.storage
    .from("signatures")
    .getPublicUrl(filePath);

  await supabase.from("signatures").insert({
    signing_request_id: requestId,
    signer_name: name,
    signature_image_url: urlData.publicUrl
  });

  await supabase
    .from("signing_requests")
    .update({
      status: "signed",
      signed_at: new Date().toISOString()
    })
    .eq("id", requestId);

  document.body.innerHTML =
    "<h2>Agreement signed successfully.</h2>";
}

loadAgreement();
</script>

</body>
</html>
