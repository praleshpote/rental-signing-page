<!DOCTYPE html>
<html>
<head>
  <title>Sign Agreement</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
    }

    #pdfContainer {
      border: 1px solid #ccc;
      margin-bottom: 20px;
      padding: 10px;
      min-height: 80px;
    }

    canvas {
      border: 1px solid #333;
      width: 100%;
      height: 200px;
      touch-action: none;
    }

    button {
      padding: 10px 14px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Rental Agreement</h2>

<div id="pdfContainer">Loading agreement...</div>

<label>Full Name</label>
<input id="signerName" style="width:100%; padding:10px;" />

<h3>Signature</h3>
<canvas id="canvas" width="800" height="200"></canvas>

<br>
<button onclick="clearCanvas()">Clear</button>
<button onclick="submitSignature()">Submit Signature</button>

<script>
const SUPABASE_URL = "https://ynpiihwwzhcnfszpaaya.supabase.co";
const SUPABASE_ANON_KEY = "PASTE_YOUR_ANON_KEY_HERE";

const supabaseClient = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const token = new URLSearchParams(window.location.search).get("token");
let requestId = null;

async function loadAgreement() {
  const box = document.getElementById("pdfContainer");

  if (!token) {
    box.innerHTML = "<h3>Missing signing token</h3>";
    return;
  }

  box.innerHTML = "Searching agreement...";

  const { data, error } = await supabaseClient
    .from("signing_requests")
    .select("*")
    .eq("token", token)
    .maybeSingle();

  if (error) {
    box.innerHTML = "<h3>Supabase Error</h3><pre>" + JSON.stringify(error, null, 2) + "</pre>";
    return;
  }

  if (!data) {
    box.innerHTML = "<h3>Invalid link. No agreement found.</h3>";
    return;
  }

  if (!data.agreement_pdf_base64) {
    box.innerHTML = "<h3>No PDF found in database.</h3>";
    return;
  }

  if (data.status === "signed") {
    document.body.innerHTML = "<h2>This agreement is already signed.</h2>";
    return;
  }

  requestId = data.id;
  document.getElementById("signerName").value = data.tenant_name || "";

  box.innerHTML = `
    <embed
      src="data:application/pdf;base64,${data.agreement_pdf_base64}"
      width="100%"
      height="600px"
      type="application/pdf"
    />
  `;
}

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let drawing = false;

function getPosition(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches && e.touches[0];

  return {
    x: (touch ? touch.clientX : e.clientX) - rect.left,
    y: (touch ? touch.clientY : e.clientY) - rect.top
  };
}

function startDrawing(e) {
  drawing = true;
  const pos = getPosition(e);
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}

function stopDrawing() {
  drawing = false;
  ctx.beginPath();
}

function draw(e) {
  if (!drawing) return;

  e.preventDefault();

  const pos = getPosition(e);

  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}

canvas.addEventListener("mousedown", startDrawing);
canvas.addEventListener("mouseup", stopDrawing);
canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchstart", startDrawing);
canvas.addEventListener("touchend", stopDrawing);
canvas.addEventListener("touchmove", draw);

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

async function submitSignature() {
  const name = document.getElementById("signerName").value.trim();

  if (!name) {
    alert("Enter your name.");
    return;
  }

  if (!requestId) {
    alert("Agreement not loaded.");
    return;
  }

  const blob = await new Promise(resolve =>
    canvas.toBlob(resolve, "image/png")
  );

  const filePath = `${requestId}.png`;

  const upload = await supabaseClient.storage
    .from("signatures")
    .upload(filePath, blob, {
      upsert: true,
      contentType: "image/png"
    });

  if (upload.error) {
    alert("Upload failed: " + upload.error.message);
    return;
  }

  const { data: urlData } = supabaseClient.storage
    .from("signatures")
    .getPublicUrl(filePath);

  const insertResult = await supabaseClient
    .from("signatures")
    .insert({
      signing_request_id: requestId,
      signer_name: name,
      signature_image_url: urlData.publicUrl
    });

  if (insertResult.error) {
    alert("Signature save failed: " + insertResult.error.message);
    return;
  }

  const updateResult = await supabaseClient
    .from("signing_requests")
    .update({
      status: "signed",
      signed_at: new Date().toISOString()
    })
    .eq("id", requestId);

  if (updateResult.error) {
    alert("Status update failed: " + updateResult.error.message);
    return;
  }

  document.body.innerHTML = "<h2>Agreement signed successfully.</h2>";
}

loadAgreement();
</script>

</body>
</html>
